<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #ff4e50, #fc913a);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  width: 300px;
  animation: aparecer 1s ease;
}

h1 {
  color: #ff4e50;
}

p {
  font-size: 18px;
  color: #333;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  background: #ff4e50;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #e63e40;
}

@keyframes aparecer {
  from {
    opacity: 0;
    transform: scale(0.8);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}
</style>
</head>

<body>

<div class="card">
  <h1>Para ti 💖</h1>
  <p id="mensaje">Eres mi persona favorita 🥺</p>

  <button onclick="cambiarMensaje()">No presiones 😏</button>
</div>

<script>
function cambiarMensaje() {
  document.getElementById("mensaje").innerHTML = "Ahora me debes un beso 😘🔥";
}
</script>

</body>
</html>
